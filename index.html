<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWC Fitness Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #555555;
    --pass: #c8f135;
    --fail: #ff4d4d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--accent);
  }

  header p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #last-updated {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    gap: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 1.25rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-btn:hover:not(.active) {
    color: var(--text);
  }

  /* CONTENT */
  .tab-content { display: none; padding: 1.5rem; }
  .tab-content.active { display: block; }

  /* STAT CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .stat-card.fail::before { background: var(--fail); }

  .stat-card .label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .stat-card .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .stat-card .status {
    font-size: 0.65rem;
    font-weight: 500;
  }

  .stat-card .status.pass { color: var(--pass); }
  .stat-card .status.fail { color: var(--fail); }

  .stat-card .pct {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* CHARTS */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  @media (max-width: 600px) {
    .charts-grid { grid-template-columns: 1fr; }
  }

  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.25rem;
  }

  .chart-box h3 {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1rem;
  }

  .chart-box canvas { max-height: 220px; }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.75rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.7rem;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 0.75rem 1rem;
    text-align: left;
    color: var(--muted);
    font-weight: 400;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid #1a1a1a;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  .check { color: var(--pass); }
  .cross { color: var(--fail); }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .dot-flash span {
    animation: blink 1.2s infinite;
    margin-left: 2px;
  }
  .dot-flash span:nth-child(2) { animation-delay: 0.2s; }
  .dot-flash span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  /* LINKS */
  .header-links {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }

  .header-links a {
    font-size: 0.65rem;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .header-links a:hover { border-bottom-color: var(--accent); }

  /* PROGRESS BARS */
  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }

  .bar-label {
    font-size: 0.65rem;
    width: 90px;
    color: var(--text);
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-fill.deficit { background: #4dc8ff; }

  .bar-pct {
    font-size: 0.6rem;
    color: var(--muted);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>CWC FITNESS</h1>
  <p>Accountability Tracker</p>
  <div class="header-links">
    <a href="https://docs.google.com/spreadsheets/d/1YJZJmV8Za3nA_a-KAjdgVTahOVlIsFJteJ9aocwKJtM/edit" target="_blank">📊 View Spreadsheet</a>
  </div>
  <div id="last-updated"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('period')">Last 14 Days</button>
  <button class="tab-btn" onclick="switchTab('alltime')">All-Time</button>
</div>

<div id="tab-period" class="tab-content active">
  <div class="loading dot-flash" id="loading-period">LOADING<span>.</span><span>.</span><span>.</span></div>
  <div id="period-content" style="display:none">
    <div class="stat-grid" id="period-cards"></div>
    <div class="charts-grid">
      <div class="chart-box">
        <h3>💪 Workout Completion %</h3>
        <canvas id="chart-period-workout"></canvas>
      </div>
      <div class="chart-box">
        <h3>🥗 Deficit Completion %</h3>
        <canvas id="chart-period-deficit"></canvas>
      </div>
    </div>
    <p class="section-title">Raw Data — Last 14 Days</p>
    <div class="table-wrap">
      <table id="table-period">
        <thead><tr>
          <th>Date</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="tab-alltime" class="tab-content">
  <div class="loading dot-flash" id="loading-alltime">LOADING<span>.</span><span>.</span><span>.</span></div>
  <div id="alltime-content" style="display:none">
    <div class="stat-grid" id="alltime-cards"></div>
    <div class="charts-grid">
      <div class="chart-box">
        <h3>💪 All-Time Workout %</h3>
        <div id="bars-workout"></div>
      </div>
      <div class="chart-box">
        <h3>🥗 All-Time Deficit %</h3>
        <div id="bars-deficit"></div>
      </div>
    </div>
    <p class="section-title" style="margin-top:1rem">Raw Data — All-Time</p>
    <div class="table-wrap">
      <table id="table-alltime">
        <thead><tr>
          <th>Date</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1YJZJmV8Za3nA_a-KAjdgVTahOVlIsFJteJ9aocwKJtM';
const SHEET_NAMES = [];
let allData = {}; // { username: [ {date, loggedDate, workout, deficit} ] }
let users = [];
let periodCharts = {};

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

async function fetchSheetData(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json;
}

async function fetchAllSheets() {
  // First get the spreadsheet to find user sheet names
  const metaUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(metaUrl);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);

  // Get sheet names from URL approach — fetch each known tab
  // We'll use the API to list sheets
  const sheetsApiUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=SELECT%20*`;
  
  // Parse default sheet first, then try to find user tabs
  return json;
}

function parseRows(json) {
  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows || [];
  return rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      obj[cols[i]] = cell ? cell.v : null;
    });
    return obj;
  });
}

async function loadUserData(username) {
  try {
    const json = await fetchSheetData(username);
    const rows = parseRows(json);
    return rows.filter(r => r['Check-in Date']).map(r => ({
      date: r['Check-in Date'],
      loggedDate: r['Logged Date'] || '',
      workout: r['Workout'] === '✅',
      deficit: r['Deficit'] === '✅'
    }));
  } catch (e) {
    console.warn(`Could not load sheet for ${username}:`, e);
    return [];
  }
}

function getLast14(data) {
  const sorted = [...data].sort((a, b) => b.date.localeCompare(a.date));
  return sorted.slice(0, 14);
}

function calcStats(data) {
  const total = data.length;
  const workouts = data.filter(d => d.workout).length;
  const deficits = data.filter(d => d.deficit).length;
  return {
    total,
    workouts,
    deficits,
    workoutPct: total ? Math.round(workouts / total * 100) : 0,
    deficitPct: total ? Math.round(deficits / total * 100) : 0,
    workoutPass: workouts >= Math.round(6 * (Math.min(total,14) / 7)),
    deficitPass: deficits >= Math.round(5 * (Math.min(total,14) / 7)),
  };
}

function renderCards(containerId, statsMap, period) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  users.forEach(u => {
    const s = statsMap[u];
    const passed = s.workoutPass && s.deficitPass;
    const card = document.createElement('div');
    card.className = `stat-card ${passed ? '' : 'fail'}`;
    card.innerHTML = `
      <div class="label">${period === 'period' ? 'Last 14 Days' : 'All-Time'}</div>
      <div class="name">${u}</div>
      <div class="status ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASSING' : '✗ FAILING'}</div>
      <div class="pct">💪 ${s.workoutPct}% · 🥗 ${s.deficitPct}%</div>
    `;
    el.appendChild(card);
  });
}

function renderBarCharts(statsMap) {
  const wo = document.getElementById('bars-workout');
  const de = document.getElementById('bars-deficit');
  wo.innerHTML = '';
  de.innerHTML = '';

  users.forEach(u => {
    const s = statsMap[u];

    const wRow = document.createElement('div');
    wRow.className = 'bar-row';
    wRow.innerHTML = `
      <div class="bar-label">${u}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${s.workoutPct}%"></div></div>
      <div class="bar-pct">${s.workoutPct}%</div>
    `;
    wo.appendChild(wRow);

    const dRow = document.createElement('div');
    dRow.className = 'bar-row';
    dRow.innerHTML = `
      <div class="bar-label">${u}</div>
      <div class="bar-track"><div class="bar-fill deficit" style="width:${s.deficitPct}%"></div></div>
      <div class="bar-pct">${s.deficitPct}%</div>
    `;
    de.appendChild(dRow);
  });
}

function renderPeriodCharts(statsMap) {
  const ACCENT = '#c8f135';
  const ACCENT2 = '#4dc8ff';
  const BG = '#111111';
  const MUTED = '#333333';

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a1a',
        titleColor: '#f0f0f0',
        bodyColor: '#888',
        borderColor: '#333',
        borderWidth: 1,
      }
    },
    scales: {
      x: {
        ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } },
        grid: { color: MUTED }
      },
      y: {
        min: 0, max: 100,
        ticks: { color: '#555', font: { family: 'DM Mono', size: 10 }, callback: v => v + '%' },
        grid: { color: MUTED }
      }
    }
  };

  if (periodCharts.workout) periodCharts.workout.destroy();
  if (periodCharts.deficit) periodCharts.deficit.destroy();

  periodCharts.workout = new Chart(document.getElementById('chart-period-workout'), {
    type: 'bar',
    data: {
      labels: users,
      datasets: [{
        data: users.map(u => statsMap[u].workoutPct),
        backgroundColor: ACCENT,
        borderRadius: 2,
      }]
    },
    options: chartDefaults
  });

  periodCharts.deficit = new Chart(document.getElementById('chart-period-deficit'), {
    type: 'bar',
    data: {
      labels: users,
      datasets: [{
        data: users.map(u => statsMap[u].deficitPct),
        backgroundColor: ACCENT2,
        borderRadius: 2,
      }]
    },
    options: chartDefaults
  });
}

function renderTable(tableId, data, userList) {
  const table = document.getElementById(tableId);
  
  // Get all unique dates
  const allDates = [...new Set(
    userList.flatMap(u => data[u].map(d => d.date))
  )].sort((a, b) => b.localeCompare(a));

  // Build header
  const thead = table.querySelector('thead tr');
  thead.innerHTML = '<th>Date</th>';
  userList.forEach(u => {
    thead.innerHTML += `<th colspan="2">${u}</th>`;
  });

  // Sub-header
  const subrow = document.createElement('tr');
  subrow.innerHTML = '<th></th>';
  userList.forEach(() => {
    subrow.innerHTML += '<th>💪</th><th>🥗</th>';
  });
  thead.after(subrow);

  // Body
  const tbody = table.querySelector('tbody');
  tbody.innerHTML = '';
  allDates.forEach(date => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${date}</td>`;
    userList.forEach(u => {
      const row = data[u].find(d => d.date === date);
      if (row) {
        tr.innerHTML += `
          <td class="${row.workout ? 'check' : 'cross'}">${row.workout ? '✅' : '❌'}</td>
          <td class="${row.deficit ? 'check' : 'cross'}">${row.deficit ? '✅' : '❌'}</td>
        `;
      } else {
        tr.innerHTML += '<td class="cross">—</td><td class="cross">—</td>';
      }
    });
    tbody.appendChild(tr);
  });
}

async function init() {
  // Try to discover user sheets by attempting known usernames
  // We'll fetch the spreadsheet info via a trick — load Sheet1 to get started
  // then load each non-system sheet

  // Known system sheets to skip
  const systemSheets = ['Summary', 'Reports', 'Sheet1'];

  // We fetch the spreadsheet metadata via the feeds API
  try {
    const feedUrl = `https://spreadsheets.google.com/feeds/worksheets/${SHEET_ID}/public/basic?alt=json`;
    const res = await fetch(feedUrl);
    const json = await res.json();
    const entries = json.feed.entry || [];
    
    users = entries
      .map(e => e.title.$t)
      .filter(name => !systemSheets.includes(name));

    if (users.length === 0) {
      document.getElementById('loading-period').innerHTML = 'No user data found yet.';
      document.getElementById('loading-alltime').innerHTML = 'No user data found yet.';
      return;
    }

    // Load all user data
    for (const u of users) {
      allData[u] = await loadUserData(u);
    }

    // Period stats (last 14 days)
    const periodData = {};
    const periodStats = {};
    users.forEach(u => {
      periodData[u] = getLast14(allData[u]);
      periodStats[u] = calcStats(periodData[u]);
    });

    // All-time stats
    const alltimeStats = {};
    users.forEach(u => {
      alltimeStats[u] = calcStats(allData[u]);
    });

    // Render period tab
    renderCards('period-cards', periodStats, 'period');
    renderPeriodCharts(periodStats);
    renderTable('table-period', periodData, users);
    document.getElementById('loading-period').style.display = 'none';
    document.getElementById('period-content').style.display = 'block';

    // Render alltime tab
    renderCards('alltime-cards', alltimeStats, 'alltime');
    renderBarCharts(alltimeStats);
    renderTable('table-alltime', allData, users);
    document.getElementById('loading-alltime').style.display = 'none';
    document.getElementById('alltime-content').style.display = 'block';

    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleString();

  } catch (e) {
    console.error(e);
    document.getElementById('loading-period').innerHTML = 'Error loading data. Make sure the sheet is public.';
    document.getElementById('loading-alltime').innerHTML = 'Error loading data.';
  }
}

init();
</script>
</body>
</html>
